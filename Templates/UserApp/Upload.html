<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Eye Disease Identification | Upload Image</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Favicon -->
    <link href="{% static 'img/favicon.ico' %}" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Inter:wght@700;800&display=swap" rel="stylesheet">

    <!-- Icon Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheets -->
    <link href="{% static 'lib/animate/animate.min.css' %}" rel="stylesheet">
    <link href="{% static 'lib/owlcarousel/assets/owl.carousel.min.css' %}" rel="stylesheet">

    <!-- Bootstrap & Template Styles -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>

<body>
    <div class="container-xxl bg-white p-0">

        <!-- Spinner Start -->
        <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 
             d-flex align-items-center justify-content-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
        <!-- Spinner End -->

        <!-- Navbar Start -->
        <div class="container-fluid nav-bar bg-transparent">
            <nav class="navbar navbar-expand-lg bg-white navbar-light py-0 px-4 shadow-sm">
                <a href="/userhome" class="navbar-brand d-flex align-items-center text-center">
                    <div class="icon p-2 me-2">
                        <img class="img-fluid" src="{% static 'img/icon-deal.png' %}" alt="Icon" 
                             style="width: 30px; height: 30px;">
                    </div>
                    <h1 class="m-0 text-primary">Eye Disease Identification</h1>
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                        data-bs-target="#navbarCollapse">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarCollapse">
                    <div class="navbar-nav ms-auto">
                        <a href="/userhome" class="nav-item nav-link">Home</a>
                        <a href="/viewprofile" class="nav-item nav-link">View Profile</a>
                        <a href="/uploadImage" class="nav-item nav-link active">Upload Image</a>
                        <a href="/brainstrokepredict" class="nav-item nav-link">Identify Disease</a>
                        <a href="/login" class="nav-item nav-link">Logout</a>
                    </div>
                </div>
            </nav>
        </div>
        <!-- Navbar End -->

        <!-- Header / Upload Section Start -->
        <div class="container-fluid header bg-white py-5" style="margin-top: 80px;">
            <div class="row g-5 align-items-center">
                
                <div class="col-md-6 text-center">
                    <img class="img-fluid rounded shadow-sm" 
                         src="{% static 'images/bright.png' %}" 
                         alt="Upload Illustration">
                </div>

                <div class="col-md-6">
                    <form action="/imageAction" method="post" enctype="multipart/form-data" class="p-4 rounded shadow-sm border">
                        {% csrf_token %}
                        <h2 class="text-danger mb-3">{{ data }}</h2>
                        <h3 class="text-primary mb-4">Upload Image</h3>
                        
                        <div class="mb-3">
                            <input type="file" class="form-control border-2 py-3" name="image" required>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark py-3">Upload</button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
        <!-- Header / Upload Section End -->

        <!-- Back to Top -->
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top">
            <i class="bi bi-arrow-up"></i>
        </a>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'lib/wow/wow.min.js' %}"></script>
    <script src="{% static 'lib/easing/easing.min.js' %}"></script>
    <script src="{% static 'lib/waypoints/waypoints.min.js' %}"></script>
    <script src="{% static 'lib/owlcarousel/owl.carousel.min.js' %}"></script>

    <!-- Template Javascript -->
    <script src="{% static 'js/main.js' %}"></script>
</body>

</html>
