<!doctype html>
<html>
  <head>
    <title>Diabetes Consultation Chatbot</title>

    <style>
      body {
        font-family: Arial;
        background-color: #f2f2f2;
      }

      .chat-container {
        width: 400px;
        margin: 50px auto;
        background: white;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
      }

      .chat-header {
        background: #2e7d32;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 20px;
        border-radius: 10px 10px 0 0;
      }

      .chat-box {
        height: 350px;
        overflow-y: auto;
        padding: 10px;
      }
      .user {
        text-align: right;
        margin: 10px;
        color: white;
        background: #1976d2;
        display: inline-block;
        padding: 8px;
        border-radius: 10px;
      }

      .bot {
        text-align: left;
        margin: 10px;
        color: white;
        background: #43a047;
        display: inline-block;
        padding: 8px;
        border-radius: 10px;
      }

      .input-area {
        display: flex;
        padding: 10px;
      }

      input {
        flex: 1;
        padding: 10px;
      }

      button {
        padding: 10px;
        background: #2e7d32;
        color: white;
        border: none;
      }
    </style>
  </head>

  <body>
    <form method="POST">{% csrf_token %}</form>
    <div class="chat-container">
      <div class="chat-header">Diabetes Consultation Bot</div>

      <div id="chat-box" class="chat-box">
        <p class="bot">Hello! I can help with diabetes related questions.</p>
      </div>

      <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <script>
      function sendMessage() {
        let input = document.getElementById("user-input").value;
        let chatBox = document.getElementById("chat-box");

        chatBox.innerHTML += "<p class='user'>" + input + "</p>";

        fetch("/chatbot/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}",
          },
          body: JSON.stringify({ message: input }),
        })
          .then((response) => response.json())
          .then((data) => {
            chatBox.innerHTML += "<p class='bot'>" + data.reply + "</p>";

            chatBox.scrollTop = chatBox.scrollHeight;
          });

        document.getElementById("user-input").value = "";
      }

      document
        .getElementById("user-input")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            sendMessage();
          }
        });
    </script>
  </body>
</html>
